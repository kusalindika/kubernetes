{{- if and .Values.istio.enabled .Values.istio.gateway.create }}
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: {{ .Values.istio.gateway.name }}
  namespace: {{ include "test-app.gatewayNamespace" . }}
spec:
  selector:
{{ toYaml .Values.istio.gateway.selector | indent 4 }}
  servers:
{{ toYaml .Values.istio.gateway.servers | indent 4 }}
{{- end }}
