apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "test-app.frontendFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "test-app.frontendLabels" . | indent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
{{ include "test-app.frontendSelectorLabels" . | indent 6 }}
  template:
    metadata:
      labels:
{{ include "test-app.frontendSelectorLabels" . | indent 8 }}
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
{{ toYaml .Values.frontend.resources | indent 12 }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "test-app.frontendFullname" . }}-nginx
